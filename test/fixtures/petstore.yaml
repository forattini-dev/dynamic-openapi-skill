openapi: "3.0.3"
info:
  title: Petstore
  version: "1.0.0"
  description: A sample API that uses a petstore as an example
externalDocs:
  url: https://docs.petstore.example.com
  description: Full Petstore documentation
servers:
  - url: https://petstore.example.com/v1
    description: Production
  - url: https://sandbox.petstore.example.com/v1
    description: Sandbox
  - url: https://{environment}.petstore.example.com/{version}
    description: Custom environment
    variables:
      environment:
        enum:
          - dev
          - staging
          - prod
        default: prod
        description: Target environment
      version:
        default: v1
        description: API version
tags:
  - name: pets
    description: Everything about your Pets
    externalDocs:
      url: https://docs.petstore.example.com/pets
      description: Pets documentation
  - name: store
    description: Access to Petstore orders
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          required: false
          description: How many items to return
          example: 10
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          required: false
          description: Filter by status
          schema:
            type: string
            enum:
              - available
              - pending
              - sold
        - name: offset
          in: query
          required: false
          description: Pagination offset
          deprecated: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
              example:
                - id: 1
                  name: "Fido"
                  status: "available"
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
            example:
              name: "Buddy"
              tag: "dog"
      responses:
        "201":
          description: The created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
              example:
                id: 42
                name: "Buddy"
                tag: "dog"
                status: "available"
          links:
            GetCreatedPet:
              operationId: getPetById
              parameters:
                petId: "$response.body#/id"
              description: Retrieve the pet that was just created
            UploadCreatedPetImage:
              operationId: uploadPetImage
              parameters:
                petId: "$response.body#/id"
              description: Upload an image for the newly created pet
  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      tags:
        - pets
      externalDocs:
        url: https://docs.petstore.example.com/pets/get
        description: Detailed get pet docs
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to retrieve
          example: 123
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
          links:
            DeleteThisPet:
              operationId: deletePet
              parameters:
                petId: "$request.path.petId"
              description: Delete this pet
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePet
      summary: Delete a pet
      deprecated: true
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Pet deleted
  /pets/{petId}/image:
    put:
      operationId: uploadPetImage
      summary: Upload a pet image
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Image uploaded
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 100
        tag:
          type: string
        status:
          type: string
          enum:
            - available
            - pending
            - sold
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        tag:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header
security:
  - bearerAuth: []
